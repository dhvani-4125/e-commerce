services:
  db:
    image: postgres:16
    container_name: ecommerce_db

    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ecommerce_backend

    volumes:
      - ./backend:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: ecommerce_frontend

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    stdin_open: true
    tty: true

    depends_on:
      - backend

volumes:
  postgres_data: